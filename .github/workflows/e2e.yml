name: E2E Tests

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      # Local PostgreSQL for Supabase-like functionality
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: entities_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      KILO_TOKEN: ${{ secrets.KILO_TOKEN }}
      BASE_URL: http://localhost:3000
      # Clerk authentication (from GitHub secrets)
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      E2E_TEST_USER_EMAIL: test@gmail.com
      # Local PostgreSQL (generated in CI)
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/entities_test
      SUPABASE_POSTGRES_URL_NON_POOLING: postgresql://postgres:postgres@localhost:5432/entities_test
      # Mock Supabase URLs (not actually used in E2E, but needed for app to start)
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
      # Inngest dev mode
      INNGEST_DEV: true
      INNGEST_EVENT_KEY: test-event-key
      INNGEST_SIGNING_KEY: test-signing-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Setup database schema
        run: |
          bun db:generate
          bun db:push
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/entities_test

      - name: Seed test data (optional)
        run: bun db:seed || echo "No seed script or seed failed, continuing..."
        continue-on-error: true

      - name: Start Inngest dev server
        run: |
          npx inngest-cli@latest dev --no-discovery --no-poll &
          echo "Inngest dev server starting..."
          sleep 5

      - name: Start dev server
        run: |
          bun run dev &
          echo "Waiting for server..."
          sleep 15

      - name: Run Playwright E2E tests
        run: bunx playwright test

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots-${{ github.sha }}
          path: tests/e2e/screenshots/
          retention-days: 7

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: tests/e2e/results/
          retention-days: 7
