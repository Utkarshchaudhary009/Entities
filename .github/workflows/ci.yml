name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SUPABASE_POSTGRES_URL_NON_POOLING: "postgresql://postgres:password@127.0.0.1:5432/test_db?schema=public"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      NEXT_PUBLIC_SUPABASE_URL: "https://mock.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "mock-key"
      INNGEST_EVENT_KEY: "mock-key"
      INNGEST_SIGNING_KEY: "mock-key"
      SKIP_ENV_VALIDATION: "true"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Generate Prisma Client
        run: bun prisma generate

      - name: Push Schema to Test DB
        run: bun prisma db push

      - name: Lint & Format Check
        run: |
          bun run lint
          bun run format

      - name: Type Check
        run: bun run type-check

      - name: Run Unit Tests
        run: bun test tests/unit

      - name: Run Integration Tests
        run: bun test tests/integration

      - name: Build Project
        run: bun run build
